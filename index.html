<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="VAT" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A collection of developer and media tools that run entirely in your browser. No uploads, no tracking."
    />
    <title>VAT — Vojir's Awesome Tools</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash.
      // Stored value is 'light' | 'dark' | 'system'; null (new install) follows the OS.
      ;(function () {
        try {
          var stored = localStorage.getItem('vat.theme')
          var dark =
            stored === 'dark' ||
            ((stored == null || stored === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
